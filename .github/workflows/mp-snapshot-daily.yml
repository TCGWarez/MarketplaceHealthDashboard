# Mana Pool Snapshot → R2 — daily at 1am EST
# Runs mp-snapshot-r2.py to fetch catalog + sales and upload to Cloudflare R2.
# Requires repo secrets: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
# Optional secret: R2_BUCKET (defaults to manapool-snapshots if unset)

name: MP Snapshot to R2 (daily)

on:
  schedule:
    # 1am EST = 06:00 UTC (EST is UTC-5)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual trigger from Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check R2 secrets are set
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
            echo "::error::One or more required R2 secrets are missing or empty: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY"
            echo "Add them under Settings → Secrets and variables → Actions and ensure each has a value."
            exit 1
          fi
          echo "Required R2 secrets are set."

      - name: Run Mana Pool snapshot
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python mp-snapshot-r2.py
